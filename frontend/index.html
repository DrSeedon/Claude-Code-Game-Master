<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DM Game Master</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- Mobile-only top bar (hidden on desktop). Doubles as list header / chat header. -->
    <header class="mobile-header">
      <button class="mobile-back-btn" id="mobile-back" aria-label="Назад" hidden>←</button>
      <span class="mobile-title" id="mobile-title">🎲 DM Game Master</span>
      <button class="mobile-new-btn" id="mobile-new-btn" aria-label="Новая кампания">+</button>
    </header>

    <!-- Sidebar: campaign list + new-campaign button -->
    <aside id="sidebar">
      <div class="sidebar-head">
        <div class="brand">
          <span class="brand-mark">🎲</span>
          <span class="brand-name">DM Game Master</span>
        </div>
        <button id="new-campaign-btn" class="btn btn-primary btn-icon" title="Новая кампания">+</button>
      </div>
      <div id="campaign-list" class="campaign-list"></div>
    </aside>

    <!-- Main panel: chat + input, or wizard -->
    <main id="main">
      <!-- Empty / welcome state -->
      <section id="welcome" class="pane welcome">
        <div class="welcome-inner">
          <div class="welcome-mark">🎲</div>
          <h1>DM Game Master</h1>
          <p>Выберите кампанию слева или создайте новую, чтобы начать приключение.</p>
          <button id="welcome-new-btn" class="btn btn-primary">+ Новая кампания</button>
        </div>
      </section>

      <!-- Game / wizard chat pane -->
      <section id="chat-pane" class="pane chat-pane" hidden>
        <header id="chat-header" class="chat-header">
          <div class="chat-title">
            <span id="chat-title-text">Кампания</span>
            <span id="conn-status" class="conn-status" title="Статус соединения">
              <span class="conn-dot"></span><span class="conn-label"></span>
            </span>
          </div>
          <div class="chat-controls">
            <button id="new-session-btn" class="btn new-session-btn" title="Сбросить контекст Claude (история сохранится)" hidden>🔄 Новая сессия</button>
            <button id="wizard-reset-btn" class="btn wizard-reset-btn" title="Начать создание заново" hidden>🗑️ Сбросить</button>
            <span id="ctx-usage" class="ctx-usage" title="Использование контекста" hidden>
              <span class="ctx-bar"><span class="ctx-fill"></span></span>
              <span class="ctx-label">0%</span>
            </span>
            <button id="model-select" class="model-btn" title="Сменить модель"></button>
          </div>
        </header>

        <!-- Character dashboard strip (game mode) -->
        <div id="char-panel" class="char-panel" hidden></div>

        <!-- Rate / session limit warning -->
        <div id="rate-limit-bar" class="rate-limit-bar" hidden></div>

        <div id="chat" class="chat-scroll"></div>

        <div class="input-bar">
          <textarea id="input" class="input" rows="1" placeholder="Введите сообщение..."></textarea>
          <button id="send-btn" class="btn btn-primary send-btn">Отправить</button>
        </div>
      </section>
    </main>

    <!-- Right panel: wizard dynamic choices ("Настройки кампании") -->
    <aside id="right-panel" class="right-panel" hidden>
      <div class="right-panel-head">Настройки кампании</div>
      <div id="choices" class="choices"></div>
    </aside>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
