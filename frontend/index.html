<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DM Game Master</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.31.2/dist/cytoscape.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- Mobile-only top bar (hidden on desktop). Doubles as list header / chat header. -->
    <header class="mobile-header">
      <button class="mobile-back-btn" id="mobile-back" aria-label="Назад" hidden>←</button>
      <span class="mobile-title" id="mobile-title">🎲 DM Game Master</span>
      <button class="mobile-model-btn model-picker-trigger" id="mobile-model-btn" aria-label="Выбрать модель" hidden></button>
      <button class="mobile-new-btn" id="mobile-new-btn" aria-label="Новая кампания">+</button>
    </header>
    <div id="model-menu" class="model-menu" role="menu" aria-label="Выбор AI-модели" hidden></div>

    <!-- Sidebar: campaign list + new-campaign button -->
    <aside id="sidebar">
      <div class="sidebar-head">
        <div class="brand">
          <span class="brand-mark">🎲</span>
          <span class="brand-name">DM Game Master</span>
        </div>
        <button id="new-campaign-btn" class="btn btn-primary btn-icon" title="Новая кампания">+</button>
      </div>
      <div id="campaign-list" class="campaign-list"></div>
    </aside>

    <!-- Main panel: chat + input, or wizard -->
    <main id="main">
      <!-- Empty / welcome state -->
      <section id="welcome" class="pane welcome">
        <div class="welcome-inner">
          <div class="welcome-mark">🎲</div>
          <h1>DM Game Master</h1>
          <p>Выберите кампанию слева или создайте новую, чтобы начать приключение.</p>
          <button id="welcome-new-btn" class="btn btn-primary">+ Новая кампания</button>
        </div>
      </section>

      <!-- Game / wizard chat pane -->
      <section id="chat-pane" class="pane chat-pane" hidden>
        <header id="chat-header" class="chat-header">
          <div class="chat-title">
            <span id="chat-title-text">Кампания</span>
            <span id="conn-status" class="conn-status" title="Статус соединения">
              <span class="conn-dot"></span><span class="conn-label"></span>
            </span>
          </div>
          <div class="chat-controls">
            <button id="new-session-btn" class="btn new-session-btn" title="Сбросить контекст текущей AI-модели (история сохранится)" hidden>🔄 Новая сессия</button>
            <button id="wizard-reset-btn" class="btn wizard-reset-btn" title="Начать создание заново" hidden>🗑️ Сбросить</button>
            <span id="ctx-usage" class="ctx-usage" title="Использование контекста" hidden>
              <span class="ctx-bar"><span class="ctx-fill"></span></span>
              <span class="ctx-label">0%</span>
            </span>
            <button id="model-picker-btn" class="model-picker-trigger" type="button" aria-haspopup="menu" aria-expanded="false">
              <span class="model-provider-dot"></span>
              <span class="model-picker-label">Загрузка моделей…</span>
              <span class="model-picker-chevron">⌄</span>
            </button>
            <button id="stop-btn" class="btn stop-btn" title="Остановить ход" hidden>■ Стоп</button>
          </div>
        </header>

        <!-- Character dashboard strip (game mode) -->
        <div id="char-panel" class="char-panel" hidden></div>

        <nav id="view-tabs" class="view-tabs" aria-label="Разделы кампании" hidden>
          <button class="view-tab active" data-view="chat"><span>✦</span> Игра</button>
          <button class="view-tab" data-view="character"><span>◈</span> Досье</button>
          <button class="view-tab" data-view="inventory"><span>▦</span> Снаряжение</button>
          <button class="view-tab" data-view="quests"><span>◎</span> Задания</button>
          <button class="view-tab" data-view="party"><span>♟</span> Люди</button>
          <button class="view-tab" data-view="wiki"><span>⌘</span> Энциклопедия</button>
          <button class="view-tab" data-view="map"><span>⌖</span> Карта</button>
        </nav>

        <!-- Rate / session limit warning -->
        <div id="rate-limit-bar" class="rate-limit-bar" hidden></div>

        <div id="chat-view" class="content-view chat-view">
          <div id="chat" class="chat-scroll"></div>

          <div class="input-bar">
            <textarea id="input" class="input" rows="1" placeholder="Введите сообщение..."></textarea>
            <button id="send-btn" class="btn btn-primary send-btn">Отправить</button>
          </div>
        </div>

        <div id="dashboard-view" class="content-view dashboard-view" hidden>
          <div id="dashboard-loading" class="dashboard-state">Загрузка...</div>
          <div id="dashboard-content"></div>
        </div>

        <div id="map-view" class="content-view map-view" hidden>
          <div class="map-toolbar">
            <div id="map-breadcrumb" class="map-breadcrumb"></div>
            <button id="map-fit-btn" class="btn btn-icon map-fit-btn" title="Показать всю карту" aria-label="Показать всю карту">⌗</button>
          </div>
          <div id="campaign-map" class="campaign-map"></div>
          <div id="map-empty" class="dashboard-state" hidden></div>
        </div>
      </section>
    </main>

    <!-- Right panel: wizard dynamic choices ("Настройки кампании") -->
    <aside id="right-panel" class="right-panel" hidden>
      <div class="right-panel-head">Настройки кампании</div>
      <div id="choices" class="choices"></div>
    </aside>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
